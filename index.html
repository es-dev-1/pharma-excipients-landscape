<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmaceutical Excipients Map - PharmaExcipients.com</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f3f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #mindmap {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #mindmap:active {
      cursor: grabbing;
    }

    #mindmap svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="mindmap"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="mindmap.js"></script>
</body>
</html>
